apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "auth-service"
        static_configs:
          - targets: ["auth-service.staging.svc.cluster.local:3000"]
      - job_name: "inventory-service"
        static_configs:
          - targets: ["inventory-service.staging.svc.cluster.local:3000"]
      - job_name: "order-service"
        static_configs:
          - targets: ["order-service.staging.svc.cluster.local:3000"]
      - job_name: "payment-service"
        static_configs:
          - targets: ["payment-service.staging.svc.cluster.local:3000"]
