apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base

patches:
  - path: kong-patch.yaml
  - path: prometheus-patch.yaml
  - path: payment-service-patch.yaml
  - path: auth-service-config-patch.yaml
  - path: inventory-service-config-patch.yaml
  - path: order-service-config-patch.yaml
  - path: otel-collector-config-patch.yaml
  - path: grafana-datasources-patch.yaml
  # Local testing: change NodePort services to ClusterIP
  - target:
      kind: Service
      name: grafana
    patch: |
      - op: replace
        path: /spec/type
        value: ClusterIP
      - op: remove
        path: /spec/ports/0/nodePort
  - target:
      kind: Service
      name: jaeger
    patch: |
      - op: replace
        path: /spec/type
        value: ClusterIP
      - op: remove
        path: /spec/ports/0/nodePort
  - target:
      kind: Service
      name: prometheus
    patch: |
      - op: replace
        path: /spec/type
        value: ClusterIP
      - op: remove
        path: /spec/ports/0/nodePort
  # Kong: increase memory limit for local K8s
  - target:
      kind: Deployment
      name: kong
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
  # Schedule app workloads on the apps node pool
  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: workload
            operator: Equal
            value: apps
            effect: NoSchedule
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          kubernetes.azure.com/agentpool: apps
  # Fix PVC lost+found issue for Postgres - mount PVC higher, use PGDATA
  - target:
      kind: Deployment
      name: auth-db
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/volumeMounts/0/mountPath
        value: /var/lib/postgresql
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PGDATA
          value: /var/lib/postgresql/data/pgdata
  - target:
      kind: Deployment
      name: inventory-db
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/volumeMounts/0/mountPath
        value: /var/lib/postgresql
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PGDATA
          value: /var/lib/postgresql/data/pgdata
  - target:
      kind: Deployment
      name: order-db
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/volumeMounts/0/mountPath
        value: /var/lib/postgresql
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PGDATA
          value: /var/lib/postgresql/data/pgdata
  - target:
      kind: Deployment
      name: payment-db
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/volumeMounts/0/mountPath
        value: /var/lib/postgresql
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PGDATA
          value: /var/lib/postgresql/data/pgdata
  # Same tolerations for migration Jobs
  - target:
      kind: Job
    patch: |
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: workload
            operator: Equal
            value: apps
            effect: NoSchedule
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          kubernetes.azure.com/agentpool: apps

images:
  - name: auth-service
    newName: hungnv2511/auth-service
    newTag: "47ca2ef"
  - name: inventory-service
    newName: hungnv2511/inventory-service
    newTag: "47ca2ef"
  - name: order-service
    newName: hungnv2511/order-service
    newTag: "47ca2ef"
  - name: payment-service
    newName: hungnv2511/payment-service
    newTag: "47ca2ef"
